apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowscale
      role: scheduler
  template:
    metadata:
      labels:
        app: flowscale
        role: scheduler
    spec:
      containers:
      - name: scheduler
        image: flowscale:latest
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: flowscale-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: flowscale-secrets
              key: DATABASE_URL
        - name: ROLE
          value: "scheduler"
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /live
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10

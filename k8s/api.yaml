apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowscale
      role: api
  template:
    metadata:
      labels:
        app: flowscale
        role: api
    spec:
      containers:
      - name: api
        image: flowscale:latest
        imagePullPolicy: Never # Adjust when publishing to an actual registry
        envFrom:
        - configMapRef:
            name: flowscale-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: flowscale-secrets
              key: DATABASE_URL
        - name: ROLE
          value: "api"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /live
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: flowscale
    role: api
  ports:
  - port: 80
    targetPort: 8080
